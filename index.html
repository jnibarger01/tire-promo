<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tire Promo CRM</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const boot = async () => {
        const isGitHubPages = window.location.hostname.endsWith("github.io");
        if (isGitHubPages) {
          const pagesEntry = "/tire-promo/assets/index.js";
          await import(/* @vite-ignore */ pagesEntry);
        } else {
          await import("/src/main.tsx");
        }
      };

      boot();
    </script>
  </body>
</html>
